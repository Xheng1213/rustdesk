name: Windows Build (Custom)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-2022
    steps:
      - name: Checkout (without submodules)
        uses: actions/checkout@v4

      - name: Fetch hbb_common
        shell: bash
        run: |
          rm -rf libs/hbb_common
          git clone --depth 1 https://github.com/Xheng1213/hbb_common.git libs/hbb_common

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.75
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: |
          choco install llvm --version=15.0.6 -y --allow-downgrade
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download Sciter DLL
        shell: bash
        run: |
          mkdir -p target/debug
          curl -L -o target/debug/sciter.dll https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll

      - name: Build RustDesk
        env:
          RS_PUB_KEY: "${{ secrets.RS_PUB_KEY }}"
        run: python build.py --portable --hwcodec --flutter --vram

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x86_64
          path: |
            rustdesk-*-x86_64.exe
            rustdesk-*-x86_64.msi
